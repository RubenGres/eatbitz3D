server {
    listen 80;
    server_name localhost;

    # Keep direct root requests predictable.
    location = / {
        return 302 /explore/;
    }

    location = /explore {
        return 301 /explore/;
    }

    location /explore/ {
        proxy_pass http://eatbitz3d/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /venn {
        return 301 /venn/;
    }

    location /venn/ {
        proxy_pass http://venn_static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /rembg {
        return 301 /rembg/;
    }

    # Keep /rembg prefix because the FastAPI routes include it.
    location /rembg/ {
        proxy_pass http://rembg:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
