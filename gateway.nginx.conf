server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s;

    location = / {
        return 302 /venn/;
    }

    location = /venn {
        return 301 /venn/;
    }
    location /venn/ {
        set $upstream_eatbitz3d eatbitz3d;
        rewrite ^/venn/(.*) /$1 break;
        proxy_pass http://$upstream_eatbitz3d;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /venn {
        return 301 /venn/;
    }
    location /venn/video {
        set $upstream_venn venn_static;
	proxy_pass http://$upstream_venn;
        proxy_http_version 1.1;
	proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /rembg {
        return 301 /rembg/;
    }
    location /rembg/ {
        set $upstream_rembg rembg;
        proxy_pass http://$upstream_rembg:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
